<!DOCTYPE html>
<html>

<head>
    <title>Combine Black level vs Inline Element</title>
</head>

<body>
    <div style="border: 2px solid black;">
        <h1 style="background-color: aquamarine;">Black Level Element</h1>
    </div>
    <p>This is <span style="color: red;"> black level </span>paragraph</p>
    <p>Block-level elements always start on a new line and take up the full width available (by default).</p>
    <hr>
    <div style="border: 2px solid black;">
        <h1 style="background-color: aquamarine;">Inline Element</h1>
    </div>
    <p>This is a <span style="color: red;">inline element </span>paragraph</p>
    <p>Inline elements do not start on a new line and only take up as much width as
        necessary.
        <hr>
    </p>
</body>

</html>
